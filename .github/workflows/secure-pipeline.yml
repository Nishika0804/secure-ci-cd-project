name: Secure CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔐 Secret Detection (FORCED)
    - name: Run Gitleaks
      run: |
        docker run --rm -v ${{ github.workspace }}:/repo zricethezav/gitleaks detect --source="/repo" --verbose --exit-code 1

    # 🐞 Vulnerability Scan
    - name: Run Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'